<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self-hosted Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-layer"></div>
  <div class="page-shell">
    <header class="hero glass">
      <div>
        <div class="badge">Umbrel-like Control Portal</div>
        <h1>Good afternoon, IAM.</h1>
        <p>Серверные группы, сервисы, пользователи, темы, autodiscovery и быстрый переход по всему стеку.</p>
      </div>
      <div class="hero-actions">
        <div id="me-box" class="badge"></div>
        <button id="settings-btn" class="ghost-btn">Настройки</button>
        <button id="logout-btn" class="ghost-btn">Выйти</button>
      </div>
    </header>

    <section class="toolbar glass">
      <div class="toolbar-main">
        <input id="search-input" class="search-input" placeholder="Поиск по серверу, IP, URL, сервису, заметкам" />
      </div>
      <div class="toolbar-actions">
        <button id="add-server-btn" class="ghost-btn">+ Сервер</button>
        <button id="add-service-btn" class="ghost-btn">+ Сервис</button>
        <button id="check-all-btn" class="ghost-btn">Проверить</button>
        <button id="discovery-btn" class="ghost-btn">Autodiscovery</button>
        <button id="export-btn" class="ghost-btn">Экспорт</button>
        <button id="import-btn" class="ghost-btn">Импорт</button>
        <input id="import-file" type="file" accept="application/json" hidden />
      </div>
    </section>

    <section id="summary-cards" class="summary-grid"></section>
    <main id="servers-root" class="servers-root"></main>
  </div>

  <dialog id="server-modal" class="modal">
    <form method="dialog" id="server-form" class="modal-card glass form-stack">
      <div class="modal-head">
        <h2 id="server-modal-title">Сервер</h2>
        <button type="button" class="icon-btn" data-close>✕</button>
      </div>
      <input name="id" hidden />
      <label><span>Название</span><input name="name" required /></label>
      <div class="two-col">
        <label><span>IP</span><input name="ip" /></label>
        <label><span>Base URL</span><input name="baseUrl" placeholder="https://welcome.example.com" /></label>
      </div>
      <label><span>Описание</span><input name="description" /></label>
      <label><span>Теги через запятую</span><input name="tags" placeholder="prod, eu, gpu" /></label>
      <label class="checkbox-row"><input name="expanded" type="checkbox" checked /> <span>Раскрывать по умолчанию</span></label>
      <div class="modal-actions">
        <button type="button" class="ghost-btn" data-close>Отмена</button>
        <button type="submit" class="primary-btn">Сохранить</button>
      </div>
    </form>
  </dialog>

  <dialog id="service-modal" class="modal">
    <form method="dialog" id="service-form" class="modal-card glass form-stack wide">
      <div class="modal-head">
        <h2 id="service-modal-title">Сервис</h2>
        <button type="button" class="icon-btn" data-close>✕</button>
      </div>
      <input name="id" hidden />
      <div class="two-col">
        <label><span>Сервер</span><select name="serverId" required></select></label>
        <label><span>Название</span><input name="name" required /></label>
      </div>
      <div class="two-col">
        <label><span>URL</span><input name="url" required /></label>
        <label><span>Категория</span><input name="category" /></label>
      </div>
      <label><span>Описание</span><input name="description" /></label>
      <div class="two-col">
        <label><span>Иконка</span><input name="iconUrl" /></label>
        <label><span>Health URL</span><input name="healthUrl" /></label>
      </div>
      <div class="two-col">
        <label><span>Check Method</span>
          <select name="checkMethod">
            <option value="auto">auto</option>
            <option value="http">http</option>
            <option value="ping">ping</option>
            <option value="disabled">disabled</option>
          </select>
        </label>
        <label class="checkbox-row"><input name="pinned" type="checkbox" /> <span>Pinned</span></label>
      </div>
      <label><span>Notes</span><textarea name="notes" rows="3"></textarea></label>
      <label><span>Credentials JSON</span><textarea name="credentials" rows="5" placeholder='[{"label":"Username","value":"postgres","secret":false}]'></textarea></label>
      <label><span>Links JSON</span><textarea name="links" rows="4" placeholder='[{"label":"Docs","url":"https://..."}]'></textarea></label>
      <div class="modal-actions">
        <button type="button" class="ghost-btn" data-close>Отмена</button>
        <button type="submit" class="primary-btn">Сохранить</button>
      </div>
    </form>
  </dialog>

  <dialog id="discovery-modal" class="modal">
    <div class="modal-card glass wide">
      <div class="modal-head">
        <h2>Docker autodiscovery</h2>
        <button type="button" class="icon-btn" data-close>✕</button>
      </div>
      <div class="discovery-toolbar">
        <label><span>Импортировать в сервер</span><select id="discovery-server-select"></select></label>
        <button id="discovery-refresh-btn" class="ghost-btn">Обновить</button>
        <button id="discovery-import-btn" class="primary-btn">Импортировать выбранное</button>
      </div>
      <div class="discovery-search-wrap">
        <input id="discovery-search-input" class="search-input discovery-search-input" placeholder="Фильтр по контейнеру, image, URL, категории" />
      </div>
      <div id="discovery-status" class="muted"></div>
      <div id="discovery-list" class="discovery-list"></div>
    </div>
  </dialog>

  <dialog id="settings-modal" class="modal">
    <div class="modal-card glass wide settings-card">
      <div class="modal-head">
        <div>
          <h2>Настройки</h2>
          <div id="settings-user-box" class="muted small"></div>
        </div>
        <button type="button" class="icon-btn" data-close>✕</button>
      </div>
      <div class="settings-grid">
        <section class="settings-section glass-subtle">
          <h3>Appearance</h3>
          <label><span>Theme mode</span>
            <select id="theme-mode-select">
              <option value="system">System</option>
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </label>
          <div>
            <div class="muted small">Accent presets</div>
            <div id="accent-presets" class="preset-row"></div>
          </div>
          <div class="two-col">
            <label><span>Accent color</span><input id="accent-color-input" type="color" /></label>
            <label><span>Surface tint</span><input id="surface-color-input" type="color" /></label>
          </div>
          <label class="checkbox-row"><input id="glass-toggle-input" type="checkbox" /> <span>Glass UI</span></label>
          <label><span>Кнопки на карточках</span>
            <select id="actions-style-select">
              <option value="icons-only">Только иконки</option>
              <option value="icons-with-text">Иконки и текст</option>
              <option value="compact">Компактно</option>
            </select>
          </label>
          <div class="modal-actions">
            <button id="reset-theme-btn" class="ghost-btn" type="button">Reset</button>
          </div>
        </section>

        <section class="settings-section glass-subtle" id="users-section">
          <h3>Пользователи</h3>
          <div id="users-list" class="users-list"></div>
          <form id="user-form" class="form-stack section-form">
            <div class="two-col">
              <label><span>Username</span><input name="username" required /></label>
              <label><span>Role</span>
                <select name="role">
                  <option value="admin">admin</option>
                  <option value="viewer">viewer</option>
                </select>
              </label>
            </div>
            <div class="two-col">
              <label><span>Password</span><input name="password" type="password" required minlength="8" /></label>
              <label><span>Confirm</span><input name="confirmPassword" type="password" required minlength="8" /></label>
            </div>
            <div class="modal-actions">
              <button type="submit" class="primary-btn">Добавить пользователя</button>
            </div>
            <div id="user-form-error" class="error-text"></div>
          </form>
        </section>
      </div>
    </div>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
